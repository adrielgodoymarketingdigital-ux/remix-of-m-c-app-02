    <!-- Tracking Params Capture (Meta CAPI + UTM) -->
    <script>
      (function() {
        // Helper para ler cookie
        function getCookie(name) {
          try {
            var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match && match[2] ? decodeURIComponent(match[2]) : null;
          } catch(e) {
            return null;
          }
        }
        
        // Helper para escrever cookie
        function setCookie(name, value, days) {
          var expires = '';
          if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = '; expires=' + date.toUTCString();
          }
          document.cookie = name + '=' + encodeURIComponent(value) + expires + '; path=/; SameSite=Lax';
        }
        
        // Capturar parâmetros da URL no carregamento
        var initialParams = new URLSearchParams(window.location.search);
        var keys = ['fbclid', 'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
        
        keys.forEach(function(key) {
          var value = initialParams.get(key);
          if (value) {
            localStorage.setItem('tracking_' + key, value);
          }
        });
        
        // Gerar _fbc a partir do fbclid (formato oficial do Facebook: fb.{subdomain}.{timestamp}.{fbclid})
        var fbclid = initialParams.get('fbclid') || localStorage.getItem('tracking_fbclid');
        if (fbclid) {
          var existingFbc = getCookie('_fbc');
          if (!existingFbc) {
            var fbc = 'fb.1.' + Date.now() + '.' + fbclid;
            setCookie('_fbc', fbc, 90);
          }
        }
      })();
    </script>
    <!-- End Tracking Params Capture -->
